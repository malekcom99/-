<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التواصل</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="logo">
      <img src="assets/dog.png" alt="loven home">
       home <span>loven</span>
    </div>

    <nav>
      <ul>
        <li><a href="index.html">الرئيسية</a></li>
        <li><a href="services.html">الخدمات</a></li>
        <li><a href="gallery.html">المعرض</a></li>
        <li><a href="pricing.html">الأسعار</a></li>
        <li><a href="booking.html">الحجز</a></li>
        <li><a href="packages.html">الحزم</a></li>
        <li><a href="contact.html">التواصل</a></li>
      </ul>
    </nav>
  </header>

  <section class="page-content">
    <div class="section-title">
      <h2>تواصل معنا</h2>
      <div class="divider"></div>
    </div>

    <div class="booking-container">
      <form>
        <div class="form-group">
          <label for="name">الاسم</label>
          <input id="name" type="text" required>
        </div>
        <div class="form-group">
          <label for="email">البريد الإلكتروني</label>
          <input id="email" type="email" required>
        </div>
        <div class="form-group">
          <label for="message">رسالتك</label>
          <textarea id="message" rows="6" required></textarea>
        </div>

        <button type="button" class="btn" onclick="sendMessage()">إرسال</button>
      </form>
    </div>
  </section>

  <footer>
    <p>© 2025 loven home - جميع الحقوق محفوظة</p>
  </footer>

  <script>
    function sendMessage() {
      let name = document.getElementById("name").value;
      let email = document.getElementById("email").value;
      let message = document.getElementById("message").value;

      let text =
        "رسالة جديدة من موقع Royal Paws 🐶%0A%0A" +
        "الاسم: " + name + "%0A" +
        "الإيميل: " + email + "%0A" +
        "الرسالة: " + message;

      let url = "https://wa.me/962796257912?text=" + text;

      window.open(url, "_blank");
    }
  </script>
</body>
</html>
